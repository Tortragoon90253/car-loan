<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Option 5: ตัวอักษร "ผ่อน" สไตล์ bold minimal -->
  <rect width="64" height="64" rx="12" fill="url(#bg5)"/>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- car silhouette simplified -->
  <rect x="6" y="34" width="52" height="14" rx="5" fill="rgba(255,255,255,0.15)"/>
  <path d="M14 34 L20 24 L44 24 L50 34Z" fill="rgba(255,255,255,0.15)"/>
  <circle cx="17" cy="48" r="5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="47" cy="48" r="5" fill="rgba(255,255,255,0.25)"/>
  <!-- main text: ฿ large -->
  <text x="32" y="46" text-anchor="middle" font-family="'Arial Black',Arial" font-size="36" font-weight="900" fill="#fff" opacity="0.95">฿</text>
  <!-- top label -->
  <text x="32" y="15" text-anchor="middle" font-family="Arial" font-size="9" font-weight="700" fill="#93c5fd" letter-spacing="1">CAR LOAN</text>
</svg>
