<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Option 4: กุญแจรถ + เหรียญ typography clean -->
  <rect width="64" height="64" rx="12" fill="#fff"/>
  <rect width="64" height="64" rx="12" fill="url(#bg4)" opacity="0.08"/>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- key ring -->
  <circle cx="22" cy="22" r="12" stroke="#1e3a8a" stroke-width="5" fill="none"/>
  <circle cx="22" cy="22" r="5" fill="#3b82f6"/>
  <!-- key stem -->
  <rect x="30" y="20" width="20" height="5" rx="2" fill="#1e3a8a"/>
  <!-- key teeth -->
  <rect x="36" y="25" width="4" height="5" rx="1" fill="#1e3a8a"/>
  <rect x="43" y="25" width="4" height="5" rx="1" fill="#1e3a8a"/>
  <!-- baht symbol bottom right -->
  <circle cx="46" cy="46" r="14" fill="#1e3a8a"/>
  <text x="46" y="52" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#fff">฿</text>
</svg>
