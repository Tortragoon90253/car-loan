<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Option 3: สปีดโดมิเตอร์ + % สไตล์ gauge/meter -->
  <rect width="64" height="64" rx="12" fill="#0f172a"/>
  <!-- gauge arc background -->
  <path d="M10 42 A 22 22 0 0 1 54 42" stroke="#334155" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- gauge arc fill (blue to green) -->
  <path d="M10 42 A 22 22 0 0 1 54 42" stroke="url(#gg3)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="70 100"/>
  <defs>
    <linearGradient id="gg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- needle -->
  <line x1="32" y1="42" x2="20" y2="22" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="42" r="4" fill="#f59e0b"/>
  <!-- % text -->
  <text x="32" y="58" text-anchor="middle" font-family="Arial Black" font-size="10" font-weight="900" fill="#3b82f6">%</text>
  <!-- small car top -->
  <g transform="translate(26,4) scale(0.55)">
    <rect x="0" y="8" width="22" height="8" rx="3" fill="#fff" opacity="0.9"/>
    <path d="M4 8 L8 2 L16 2 L20 8Z" fill="#fff" opacity="0.9"/>
    <circle cx="5" cy="16" r="3.5" fill="#0f172a"/>
    <circle cx="5" cy="16" r="2" fill="#94a3b8"/>
    <circle cx="17" cy="16" r="3.5" fill="#0f172a"/>
    <circle cx="17" cy="16" r="2" fill="#94a3b8"/>
  </g>
</svg>
